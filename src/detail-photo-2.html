<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>eikon parcel starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="scss/main.scss" />
  </head>
  <body>
    <extends
      src="header.html"
      locals='{"experienceClass":"", "projectsClass":"", "aboutClass":"", "contactClass":""}'
    ></extends>
    <div class="detail-photo">
      <extends
        src="detail-title.html"
        locals='{"cat":"Narrative Photography Series", "title":"Être"}'
      ></extends>
    </div>

    <div class="detail-photo-1">
      <extends src="button-back-to-projects.html"></extends>

      <div class="container">
        <div class="row">
          <div class="col-6 offset-5">
            <img
              src="img/projects/photo/etre/etre-minia.webp"
              alt=""
              class="img-fluid"
            />
          </div>
        </div>

        <div class="row">
          <div class="col-6 offset-2">
            <img
              src="img/projects/photo/etre/etre-2.webp"
              alt=""
              class="img-fluid"
            />
          </div>
        </div>
        <div class="row">
          <div class="col-11 offset-1">
            <div class="detail-photo-1-quote">JE VOULAIS JUSTE ÊTRE MOI.</div>
          </div>
        </div>

        <div class="row">
          <div class="col-6 offset-5">
            <img
              src="img/projects/photo/etre/etre-3.webp"
              alt=""
              class="img-fluid"
            />
          </div>
        </div>

        <div class="row">
          <div class="col-5 offset-7">
            <div class="detail-infos">
              .septembre 2025 <br />
              .Photographie numérique
            </div>
          </div>
        </div>
      </div>
    </div>
    <extends src="footer.html"></extends>

    <script src="js/main.js" type="module"></script>
  </body>
</html>
