<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EXPERIENCE | VEG4</title>
    <meta
      name="description"
      content="Listen to VEG4's featured tracks. A showcase of production, sound design, and mixing skills through three core musical projects."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="scss/main.scss" />
  </head>
  <body>
    <div class="index">
      <!-- HEADER SECTION -->
      <div class="index-header">
        <div class="index-video">
          <video autoplay loop muted playsinline>
            <source src="img/homepage/visage-home.mp4" type="video/mp4" />
            Votre navigateur ne supporte pas les vidéos.
          </video>
        </div>
        <div class="index-header-text">
          <extends
            src="header.html"
            locals='{"experienceClass":"is-active", "projectsClass":"", "aboutClass":"", "contactClass":""}'
          ></extends>
        </div>

        <!-- Bouton de scroll identifié pour ton main.js -->
        <div id="scroll-button" class="index-header-arrow">
          <img src="img/SVG/arrow-share-white-homepage.svg" alt="flèche" />
        </div>
      </div>
      <!-- Fermeture cruciale du header ici -->

      <!-- CONTENU SOUS LE HEADER -->

      <!-- Section Sous le soleil -->
      <div class="experience experience-souslesoleil">
        <div class="experience-music">
          <extends
            src="experience-music.html"
            locals='{
            "title":"SOUS LE SOLEIL",
            "artists":"VEG4",
            "img":"cover-sous-lsoleil.webp",
            "audio":"sous-le-soleil.mp3"
          }'
          ></extends>
          <extends
            src="experience-music-credits-noclip.html"
            locals='{
            "credits":"Production, Sound Design, Vocals, Recording, Mixing and Mastering"}'
          ></extends>
        </div>
      </div>

      <!-- Section K Flint -->
      <div class="experience">
        <div class="experience-music">
          <extends
            src="experience-music.html"
            locals='{
            "title":"K FLINT",
            "artists":"VEG4",
            "img":"cover-kflint.webp",
            "audio":"kflint.mp3"
          }'
          ></extends>
          <extends
            src="experience-music-credits.html"
            locals='{
            "credits":"Production, Sound Design, Guitar, Vocals, Recording, Mixing and Mastering",
            "linkText":"Music Video",
            "linkUrl":"https://www.youtube.com/watch?v=qGoeESLl0-s",
            "linkUrlMedia":"",
            "sharecredits":"BY VEG4"
          }'
          ></extends>
        </div>
      </div>

      <!-- Section Hiver à Lndn -->
      <div class="experience">
        <div class="experience-music">
          <extends
            src="experience-music.html"
            locals='{
            "title":"HIVER À LNDN",
            "artists":"VEG4, Sonar",
            "img":"cover-hiveralndn.webp",
            "audio":"hiveralndn.mp3"
          }'
          ></extends>
          <extends
            src="experience-music-credits.html"
            locals='{
            "credits":"Production, Vocals, Recording",
            "linkText":"Music Video",
            "linkUrl":"https://www.youtube.com/watch?v=ZMa8hJTtPOo",
            "linkUrlMedia":"https://www.instagram.com/j4ed.gz/",
            "sharecredits":"BY @J4ED.GZ"
          }'
          ></extends>
        </div>
      </div>

      <div class="index-footer">
        <extends src="footer.html"></extends>
      </div>
    </div>

    <!-- Tes scripts en fin de body -->
    <script src="js/main.js" type="module"></script>
    <script src="js/experience-music.js"></script>
  </body>
</html>
